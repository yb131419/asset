<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>回覆靈感</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#F5F4F1;--surface:#FFFFFF;--surface2:#EFEDE9;
  --border:#E2DFD8;--border2:#C5C1B8;
  --ink:#1A1916;--ink2:#4A4844;--ink3:#908D86;
  --green:#2A6644;--green-bg:#E8F2EC;
  --amber:#A8720A;--amber-bg:#FBF3E0;
  --red:#B83232;--red-bg:#FBEEEE;
  --tab-h:56px;--nav-h:52px;
  --safe-b:env(safe-area-inset-bottom,0px);
  --r:14px;--r-sm:10px;
  --ease:cubic-bezier(.16,1,.3,1);
  --shadow:0 1px 6px rgba(0,0,0,.07);
  --shadow-md:0 4px 20px rgba(0,0,0,.10);
}
html,body{
  background:var(--bg);color:var(--ink);
  font-family:'Inter',sans-serif;font-size:15px;line-height:1.6;
  overflow-x:hidden;-webkit-font-smoothing:antialiased;
}
.app{display:flex;flex-direction:column;height:100vh;height:100dvh;overflow:hidden}

/* ── TOP NAV ── */
.topnav{
  flex:none;padding:8px 14px;
  padding-top:calc(8px + env(safe-area-inset-top,0));
  background:var(--surface);border-bottom:1px solid var(--border);
  display:flex;flex-direction:column;gap:8px;
  box-shadow:var(--shadow);z-index:100;
}
.topnav-row1{display:flex;align-items:center;gap:8px}
.topnav-row2{display:flex;align-items:center;gap:8px}
.topnav-brand{flex:1;min-width:0;display:flex;align-items:center;gap:8px;overflow:hidden}
.topnav-icon{
  width:32px;height:32px;border-radius:9px;background:var(--green);
  display:grid;place-items:center;flex:none;
}
.topnav-icon svg{width:17px;height:17px;fill:#fff}
.topnav-title{
  font-family:'Noto Serif TC',serif;font-size:16px;font-weight:700;
  color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.pill{
  flex:1;font-size:12px;color:var(--ink3);white-space:nowrap;
  padding:8px 10px;border-radius:10px;text-align:center;
  background:var(--surface2);border:1px solid var(--border);
  cursor:pointer;transition:background .15s;
  font-family:'Inter',sans-serif;
  overflow:hidden;text-overflow:ellipsis;
}
.pill:active{background:var(--border)}
.pill b{color:var(--green);font-weight:600}
.pill.gold b{color:var(--amber)}
.settings-btn{
  flex:none;width:38px;height:38px;border-radius:var(--r-sm);
  border:1px solid var(--border);background:var(--surface2);
  color:var(--ink2);font-size:17px;
  display:grid;place-items:center;cursor:pointer;transition:background .15s;
}
.settings-btn:active{background:var(--border)}

/* ── SCROLL ── */
.scroll{
  flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;
  padding-bottom:calc(var(--tab-h) + var(--safe-b) + 60px);
}
.page{display:none;padding:16px 14px 0}
.page.show{display:block;animation:fadeUp .2s var(--ease) both}
@keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.page-head{margin-bottom:16px}
.page-head-title{
  font-size:13px;font-weight:600;color:var(--ink3);
  letter-spacing:.06em;text-transform:uppercase;margin-bottom:2px;
}
.page-head-desc{font-size:13px;color:var(--ink3);line-height:1.65}

/* ── STEPS ── */
.steps{display:flex;flex-direction:column;gap:10px}
.step{
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--r);overflow:hidden;box-shadow:var(--shadow);
}
.step-head{
  display:flex;align-items:center;gap:10px;
  padding:13px 16px;border-bottom:1px solid var(--border);
}
.step-num{
  width:26px;height:26px;border-radius:8px;background:var(--green);
  color:#fff;font-size:12px;font-weight:700;
  display:grid;place-items:center;flex:none;
}
.step-num.amber{background:var(--amber)}
.step-label{font-size:14px;font-weight:600;color:var(--ink);flex:1;min-width:0}
.step-badge{
  flex:none;font-size:11px;padding:2px 9px;border-radius:99px;
  background:var(--green-bg);color:var(--green);
  border:1px solid rgba(42,102,68,.15);font-weight:500;
}
.step-badge.amber{background:var(--amber-bg);color:var(--amber);border-color:rgba(168,114,10,.2)}
.step-body{padding:14px 16px}

/* ── INPUT TABS ── */
.itabs{display:flex;border-bottom:1px solid var(--border);margin-bottom:14px}
.itab{
  flex:1;padding:9px 4px 10px;
  border:none;border-bottom:2px solid transparent;
  background:transparent;color:var(--ink3);
  font-family:'Inter',sans-serif;font-size:13.5px;font-weight:500;
  cursor:pointer;margin-bottom:-1px;
  transition:color .15s,border-color .15s;
}
.itab.on{color:var(--green);border-bottom-color:var(--green)}
.ipane{display:none}
.ipane.show{display:block;animation:fadeUp .15s var(--ease) both}

/* ── DROP ZONE ── */
.dropzone{
  display:flex;flex-direction:column;align-items:center;gap:10px;
  padding:28px 16px;border:1.5px dashed var(--border2);
  border-radius:var(--r-sm);background:var(--surface2);
  cursor:pointer;text-align:center;transition:all .18s;
}
.dropzone:active,.dropzone.over{border-color:var(--green);background:var(--green-bg)}
.dropzone input{display:none}
.dz-icon{
  width:48px;height:48px;border-radius:12px;background:var(--surface);
  border:1px solid var(--border);display:grid;place-items:center;
  font-size:24px;box-shadow:var(--shadow);
}
.dz-main{font-size:14px;font-weight:500;color:var(--ink)}
.dz-hint{font-size:12px;color:var(--ink3);line-height:1.7}
.dz-tags{display:flex;gap:6px;justify-content:center;flex-wrap:wrap;margin-top:2px}
.dz-tag{font-size:11px;padding:2px 8px;border-radius:6px;background:var(--border);color:var(--ink2)}
.prev-wrap{display:none;margin-top:12px;position:relative}
.prev-wrap.show{display:block}
.prev-wrap img{
  width:100%;max-height:260px;object-fit:contain;
  border-radius:var(--r-sm);border:1px solid var(--border);
  background:var(--surface2);display:block;
}
.prev-rm{
  position:absolute;top:8px;right:8px;width:30px;height:30px;border-radius:50%;
  background:rgba(255,255,255,.95);border:1px solid var(--border);
  color:var(--ink2);font-size:13px;display:grid;place-items:center;
  cursor:pointer;box-shadow:var(--shadow);
}
.prev-rm:active{background:var(--red-bg);color:var(--red)}

/* ── TEXTAREA / FIELD ── */
textarea{
  width:100%;min-height:130px;background:var(--surface2);
  border:1px solid var(--border);border-radius:var(--r-sm);
  color:var(--ink);font-family:'Inter',sans-serif;font-size:14px;
  line-height:1.75;padding:12px 14px;resize:vertical;
  transition:border-color .15s;-webkit-appearance:none;
}
textarea:focus{outline:none;border-color:var(--green);box-shadow:0 0 0 3px rgba(42,102,68,.10)}
textarea::placeholder{color:var(--ink3)}
.field-input{
  width:100%;background:var(--surface2);
  border:1px solid var(--border);border-radius:var(--r-sm);
  color:var(--ink);font-family:'Inter',sans-serif;font-size:14px;
  padding:12px 14px;min-height:48px;
  transition:border-color .15s;-webkit-appearance:none;
}
.field-input:focus{outline:none;border-color:var(--amber);box-shadow:0 0 0 3px rgba(168,114,10,.10)}
.field-input::placeholder{color:var(--ink3)}
.field-ta{resize:vertical;min-height:90px;line-height:1.7}

/* ── CHIPS ── */
.chips{display:flex;flex-wrap:wrap;gap:8px}
.chip{
  padding:9px 18px;border-radius:99px;
  border:1px solid var(--border);background:var(--surface2);
  color:var(--ink2);font-family:'Inter',sans-serif;font-size:14px;
  cursor:pointer;min-height:44px;display:inline-flex;align-items:center;
  transition:all .15s;
}
.chip:active{transform:scale(.95)}
.chip.on{border-color:var(--green);background:var(--green);color:#fff;font-weight:500}

/* ── CTA ── */
.page-cta{margin-top:14px}
.btn-primary{
  position:relative;overflow:hidden;width:100%;padding:16px 24px;
  border:none;border-radius:var(--r);cursor:pointer;
  font-family:'Inter',sans-serif;font-size:15px;font-weight:600;
  color:#fff;background:var(--green);min-height:54px;
  display:flex;align-items:center;justify-content:center;gap:8px;
  box-shadow:0 4px 18px rgba(42,102,68,.35);
  transition:opacity .15s,transform .15s;-webkit-appearance:none;
}
.btn-primary:active{transform:scale(.98);opacity:.9}
.btn-primary:disabled{opacity:.35;cursor:not-allowed;transform:none}
.btn-primary.amber{background:var(--amber);box-shadow:0 4px 18px rgba(168,114,10,.35)}
.btn-primary::after{
  content:'';position:absolute;top:0;left:-80%;width:50%;height:100%;
  background:linear-gradient(105deg,transparent,rgba(255,255,255,.18),transparent);
  transform:skewX(-20deg);transition:left .6s ease;
}
.btn-primary:hover:not(:disabled)::after{left:140%}

/* ── LOADING / ERROR ── */
.loading{
  display:none;align-items:center;gap:10px;
  margin-top:12px;padding:13px 14px;
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--r-sm);font-size:13px;color:var(--ink3);
}
.loading.show{display:flex}
.dots{display:flex;gap:5px}
.dots i{
  width:6px;height:6px;border-radius:50%;background:var(--green);
  display:block;animation:blink 1.2s ease-in-out infinite;
}
.loading.amber .dots i{background:var(--amber)}
.dots i:nth-child(2){animation-delay:.16s}
.dots i:nth-child(3){animation-delay:.32s}
@keyframes blink{0%,100%{opacity:.2;transform:scale(.7)}50%{opacity:1;transform:scale(1)}}
.err{
  display:none;margin-top:10px;padding:12px 14px;
  background:var(--red-bg);border:1px solid rgba(184,50,50,.18);
  border-radius:var(--r-sm);color:var(--red);font-size:13px;line-height:1.6;
}
.err.show{display:block}

/* ── RESULTS ── */
.results{display:flex;flex-direction:column;gap:10px;margin-top:12px}
.reply-card{
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--r);overflow:hidden;box-shadow:var(--shadow);
  animation:fadeUp .35s var(--ease) both;
}
.reply-head{
  display:flex;align-items:center;justify-content:space-between;
  padding:11px 14px;background:var(--surface2);
  border-bottom:1px solid var(--border);
}
.reply-label{
  font-size:12px;font-weight:600;color:var(--green);
  letter-spacing:.04em;text-transform:uppercase;
  display:flex;align-items:center;gap:6px;
}
.reply-dot{width:6px;height:6px;border-radius:50%;background:var(--green);flex:none}
.reply-body{padding:14px 16px;font-size:15px;line-height:1.9;color:var(--ink);white-space:pre-wrap}
.copy-btn{
  padding:7px 14px;border-radius:99px;
  border:1px solid var(--border);background:var(--surface);
  color:var(--ink2);font-family:'Inter',sans-serif;font-size:12px;font-weight:500;
  cursor:pointer;min-height:34px;transition:all .15s;
  display:flex;align-items:center;gap:4px;
}
.copy-btn:active{transform:scale(.94)}
.copy-btn.done{background:var(--green);color:#fff;border-color:transparent}
.copy-btn.done-amber{background:var(--amber);color:#fff;border-color:transparent}
.appr-card{
  background:var(--surface);border:1px solid rgba(168,114,10,.22);
  border-radius:var(--r);overflow:hidden;box-shadow:var(--shadow);
  animation:fadeUp .35s var(--ease) both;
}
.appr-head{
  display:flex;align-items:center;justify-content:space-between;
  padding:11px 14px;background:var(--amber-bg);
  border-bottom:1px solid rgba(168,114,10,.15);
}
.appr-label{font-size:13px;font-weight:600;color:var(--amber);display:flex;align-items:center;gap:6px}
.appr-body{padding:14px 16px;font-size:15px;line-height:2;color:var(--ink);white-space:pre-wrap}
.btn-retry{
  width:100%;padding:13px;border:1px solid var(--border);
  border-radius:var(--r-sm);background:var(--surface);
  color:var(--ink2);font-family:'Inter',sans-serif;font-size:13.5px;font-weight:500;
  cursor:pointer;min-height:48px;transition:all .15s;margin-top:4px;
}
.btn-retry:active{background:var(--surface2)}

/* ── TAB BAR ── */
.tabbar{
  position:fixed;bottom:0;left:0;right:0;z-index:100;
  height:calc(var(--tab-h) + var(--safe-b));
  padding-bottom:var(--safe-b);
  background:var(--surface);border-top:1px solid var(--border);
  display:flex;box-shadow:0 -2px 12px rgba(0,0,0,.06);
}
.tabitem{
  flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:3px;border:none;background:transparent;cursor:pointer;padding:8px 4px;
  color:var(--ink3);font-family:'Inter',sans-serif;font-size:10px;font-weight:500;
  transition:color .15s;
}
.tabitem.on{color:var(--green)}
.tabitem.on.amber{color:var(--amber)}
.tabitem-icon{font-size:22px;line-height:1}
.tabitem-label{line-height:1}

/* ── MODAL ── */
.overlay{
  position:fixed;inset:0;z-index:200;
  display:none;align-items:flex-end;justify-content:center;
  background:rgba(26,25,22,.5);
  backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);
}
.overlay.show{display:flex;animation:fadeUp .2s ease both}
.modal{
  width:100%;background:var(--surface);
  border-radius:20px 20px 0 0;
  padding:20px 20px calc(20px + var(--safe-b));
  box-shadow:var(--shadow-md);
}
.modal-handle{width:36px;height:4px;border-radius:2px;background:var(--border2);margin:0 auto 20px}
.modal-title{
  font-family:'Noto Serif TC',serif;font-size:19px;font-weight:700;
  color:var(--ink);margin-bottom:14px;
}
.modal-sec{font-size:12px;font-weight:600;color:var(--ink2);margin:18px 0 8px;letter-spacing:.04em}
.modal-row{display:flex;gap:10px;margin-top:18px}
.modal-save{
  flex:1;padding:14px;border-radius:var(--r-sm);
  border:none;background:var(--green);color:#fff;
  font-family:'Inter',sans-serif;font-size:15px;font-weight:600;
  min-height:50px;cursor:pointer;transition:opacity .15s;
}
.modal-save:active{opacity:.85}

/* ── Member card ── */
.member-card{
  display:flex;align-items:center;gap:12px;
  padding:14px;border:1px solid var(--border);
  border-radius:var(--r-sm);background:var(--surface2);
}
.member-avatar{
  width:46px;height:46px;border-radius:50%;
  background:var(--border);object-fit:cover;flex:none;
}
.member-info{flex:1;min-width:0}
.member-name{
  font-size:14.5px;font-weight:600;color:var(--ink);
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
}
.member-level{font-size:12px;color:var(--ink3);margin-top:1px}
.member-remain{
  flex:none;font-size:12px;font-weight:600;
  color:var(--green);background:var(--green-bg);
  padding:4px 10px;border-radius:99px;white-space:nowrap;
}
.member-remain.gold{color:var(--amber);background:var(--amber-bg)}

/* ── Model options ── */
.model-opts{display:flex;flex-direction:column;gap:8px}
.model-opt{
  display:flex;align-items:center;gap:12px;
  padding:13px 14px;border:1.5px solid var(--border);
  border-radius:var(--r-sm);background:var(--surface2);
  cursor:pointer;transition:border-color .15s,background .15s;
  text-align:left;width:100%;font-family:'Inter',sans-serif;
}
.model-opt.on{border-color:var(--green);background:var(--green-bg)}
.model-radio{
  width:18px;height:18px;border-radius:50%;flex:none;
  border:2px solid var(--border2);display:grid;place-items:center;
  transition:border-color .15s;
}
.model-opt.on .model-radio{border-color:var(--green)}
.model-radio::after{
  content:'';width:9px;height:9px;border-radius:50%;
  background:var(--green);transform:scale(0);
  transition:transform .15s var(--ease);
}
.model-opt.on .model-radio::after{transform:scale(1)}
.model-info{flex:1;min-width:0}
.model-name{font-size:14px;font-weight:600;color:var(--ink);line-height:1.3}
.model-desc{font-size:11.5px;color:var(--ink3);line-height:1.5;margin-top:1px}
.model-tag{flex:none;font-size:10px;font-weight:600;padding:3px 8px;border-radius:6px;background:var(--green);color:#fff}
.model-tag.blue{background:#3B6FA8}

/* ── Template selector ── */
.tpl-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.tpl-card{
  display:flex;flex-direction:column;gap:4px;
  padding:12px;border:1.5px solid var(--border);
  border-radius:var(--r-sm);background:var(--surface2);
  cursor:pointer;text-align:left;font-family:'Inter',sans-serif;
  transition:border-color .15s,background .15s,transform .15s;
}
.tpl-card:active{transform:scale(.97)}
.tpl-card.on{border-color:var(--amber);background:var(--amber-bg)}
.tpl-icon{font-size:20px;line-height:1}
.tpl-name{font-size:13.5px;font-weight:600;color:var(--ink)}
.tpl-card.on .tpl-name{color:var(--amber)}
.tpl-desc{font-size:11px;color:var(--ink3);line-height:1.5}

/* ── Hamburger / Drawer ── */
.hamburger-btn{
  flex:none;width:38px;height:38px;border-radius:var(--r-sm);
  border:1px solid var(--border);background:var(--surface2);
  color:var(--ink2);cursor:pointer;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;
  transition:background .15s;
}
.hamburger-btn:active{background:var(--border)}
.hamburger-btn span{width:16px;height:2px;background:var(--ink2);border-radius:2px}

.drawer-overlay{
  position:fixed;inset:0;z-index:300;display:none;
  background:rgba(26,25,22,.5);
  backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);
}
.drawer-overlay.show{display:block;animation:fadeIn .2s ease both}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.drawer{
  position:fixed;top:0;left:0;bottom:0;z-index:301;
  width:78%;max-width:300px;
  background:var(--surface);
  box-shadow:4px 0 24px rgba(0,0,0,.18);
  transform:translateX(-100%);
  transition:transform .28s var(--ease);
  display:flex;flex-direction:column;
  padding-top:env(safe-area-inset-top,0);
}
.drawer.show{transform:translateX(0)}
.drawer-head{
  padding:20px 18px 16px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:10px;
}
.drawer-head .topnav-icon{width:36px;height:36px}
.drawer-head-title{font-family:'Noto Serif TC',serif;font-size:17px;font-weight:700;color:var(--ink)}
.drawer-head-sub{font-size:11px;color:var(--ink3);margin-top:1px}
.drawer-nav{flex:1;overflow-y:auto;padding:10px}
.drawer-item{
  width:100%;display:flex;align-items:center;gap:12px;
  padding:13px 12px;border:none;border-radius:var(--r-sm);
  background:transparent;color:var(--ink2);cursor:pointer;
  font-family:'Inter',sans-serif;font-size:14.5px;font-weight:500;
  text-align:left;transition:background .15s;
}
.drawer-item:active{background:var(--surface2)}
.drawer-item.on{background:var(--green-bg);color:var(--green)}
.drawer-item .di-icon{font-size:19px;flex:none;width:24px;text-align:center}
.drawer-sep{height:1px;background:var(--border);margin:8px 4px}
.drawer-foot{padding:14px 18px calc(14px + var(--safe-b));border-top:1px solid var(--border)}
.drawer-guide-btn{
  width:100%;display:flex;align-items:center;justify-content:center;gap:8px;
  padding:12px;border-radius:var(--r-sm);
  border:1px solid var(--border);background:var(--surface2);
  color:var(--ink2);font-family:'Inter',sans-serif;font-size:13.5px;font-weight:500;
  cursor:pointer;transition:background .15s;
}
.drawer-guide-btn:active{background:var(--border)}

/* ── Onboarding Guide ── */
.guide-overlay{
  position:fixed;inset:0;z-index:400;display:none;
  align-items:center;justify-content:center;padding:24px;
  background:rgba(26,25,22,.72);
  backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);
}
.guide-overlay.show{display:flex;animation:fadeIn .25s ease both}
.guide-card{
  width:100%;max-width:360px;background:var(--surface);
  border-radius:20px;padding:26px 22px 22px;
  box-shadow:var(--shadow-md);text-align:center;
}

<script>
(function(){
'use strict';

/* ═══════════════════════════════════════════
   ★★ 部署設定（兩個都要填）★★
   GAS_URL：Apps Script 部署為網頁應用程式後的網址
   LIFF_ID：LINE Developers 後台建立的 LIFF ID
═══════════════════════════════════════════ */
const GAS_URL = 'https://script.google.com/macros/s/AKfycbzhDR7PproAnrsWQCgbhpv-0STg9FQJk7T6MSNN-BephnMEhOhtEvyHES78N7DJ_aY3/exec';
const LIFF_ID = '2008578880-MrvjCM33';

const $ = id => document.getElementById(id);
const K_MODEL = 'rai_model';
let imgData = null, imgMime = 'image/jpeg';
let profile = { userId: '', displayName: '', pictureUrl: '' };
let member = null; // 後端回傳的權限資訊

/* ══ 模型管理 ══ */
const MODELS = { 'gpt-4o-mini':{label:'4o mini'}, 'gpt-5-mini':{label:'5 mini'} };
function curModel(){
  const m = localStorage.getItem(K_MODEL);
  return MODELS[m] ? m : 'gpt-4o-mini';
}
function setModel(m){
  localStorage.setItem(K_MODEL, m);
  $('modelPillName').textContent = MODELS[m].label;
  $('modelOpts').querySelectorAll('.model-opt').forEach(o =>
    o.classList.toggle('on', o.dataset.model === m));
}

/* ══ LIFF 登入 ══ */
async function initLiff(){
  try{
    if(!LIFF_ID || LIFF_ID.indexOf('請填入') === 0){
      // 開發模式：沒填 LIFF ID 時以「未登入」身分測試
      profile = { userId:'未登入', displayName:'測試模式', pictureUrl:'' };
      $('memberPillText').textContent = '測試模式';
      await refreshPermission();
      return;
    }
    await liff.init({ liffId: LIFF_ID });
    if(!liff.isLoggedIn()){ liff.login(); return; }
    profile = await liff.getProfile();
    await refreshPermission();
  }catch(e){
    $('memberPillText').textContent = '登入失敗';
    showErr('LINE 登入失敗：' + (e.message || e) + '，請重新開啟頁面。');
  }
}

/* ══ 呼叫 GAS 後端 ══ */
async function callGAS(params){
  const body = new URLSearchParams(Object.assign({
    lineId: profile.userId || '未登入',
    lineName: profile.displayName || '未登入'
  }, params));
  const res = await fetch(GAS_URL, { method:'POST', body });
  if(!res.ok) throw new Error('伺服器連線失敗（HTTP ' + res.status + '）');
  return res.json();
}

/* ══ 會員權限 ══ */
async function refreshPermission(){
  try{
    const d = await callGAS({ action:'getPermission' });
    if(d.success && d.permission){
      member = d.permission;
      updateMemberUI();
    }
  }catch(e){
    $('memberPillText').textContent = '離線';
  }
}
function updateMemberUI(){
  if(!member) return;
  const pill = $('memberPill');
  const isGold = member.level === '黃金';
  pill.classList.toggle('gold', isGold);
  $('memberPillText').textContent = isGold
    ? ('黃金 · 剩 ' + member.remainCount + ' 次')
    : '尊爵 · 無限';
  // 會員中心卡片
  $('memberName').textContent = profile.displayName || '未登入';
  if(profile.pictureUrl) $('memberAvatar').src = profile.pictureUrl;
  $('memberLevel').textContent = member.msg || member.level;
  const remainEl = $('memberRemain');
  remainEl.classList.toggle('gold', isGold);
  remainEl.textContent = isGold ? ('剩餘 ' + member.remainCount + ' 次') : '無限次數';
}
function applyRemain(d){
  // 生成成功後，後端回傳最新剩餘次數
  if(!member) return;
  if(d.level) member.level = d.level;
  if(d.remain !== undefined && d.remain !== null && member.level === '黃金'){
    member.remainCount = d.remain;
    member.allow = d.remain > 0;
  }
  updateMemberUI();
}

/* ══ 會員中心面板 ══ */
function openSettings(){
  setModel(curModel());
  updateMemberUI();
  $('overlay').classList.add('show');
}
$('settingsBtn').onclick = openSettings;
$('memberPill').onclick  = openSettings;
$('modelPill').onclick   = openSettings;
$('closeModal').onclick  = () => $('overlay').classList.remove('show');
$('overlay').onclick     = e => { if(e.target === $('overlay')) $('overlay').classList.remove('show'); };
$('modelOpts').querySelectorAll('.model-opt').forEach(o => {
  o.onclick = () => setModel(o.dataset.model);
});
setModel(curModel());

/* ══ 頁面切換（Tab Bar 與 Drawer 共用）══ */
function switchPage(page){
  document.querySelectorAll('.tabitem').forEach(x => x.classList.toggle('on', x.dataset.page === page));
  document.querySelectorAll('.drawer-item[data-page]').forEach(x => x.classList.toggle('on', x.dataset.page === page));
  document.querySelectorAll('.page').forEach(p => p.classList.toggle('show', p.id === 'page-' + page));
  if(page === 'saved') renderSaved();
  $('scroll').scrollTo(0, 0);
  closeDrawer();
}
document.querySelectorAll('.tabitem').forEach(t => { t.onclick = () => switchPage(t.dataset.page); });
document.querySelectorAll('.drawer-item[data-page]').forEach(t => { t.onclick = () => switchPage(t.dataset.page); });

/* ══ 漢堡選單 Drawer ══ */
function openDrawer(){ $('drawer').classList.add('show'); $('drawerOverlay').classList.add('show'); }
function closeDrawer(){ $('drawer').classList.remove('show'); $('drawerOverlay').classList.remove('show'); }
$('hamburgerBtn').onclick = openDrawer;
$('drawerOverlay').onclick = closeDrawer;
$('drawerMember').onclick = () => { closeDrawer(); openSettings(); };
$('drawerGuideItem').onclick = () => { closeDrawer(); startGuide(); };
$('drawerGuideBtn').onclick = () => { closeDrawer(); startGuide(); };
$('goBtn').onclick   = () => generateReply(false);
$('apprBtn').onclick = () => generateAppr(false);

/* ══ 輸入 Tabs / Chips ══ */
document.querySelectorAll('.itab').forEach(t => {
  t.onclick = () => {
    document.querySelectorAll('.itab').forEach(x => x.classList.remove('on'));
    document.querySelectorAll('.ipane').forEach(x => x.classList.remove('show'));
    t.classList.add('on');
    $(t.dataset.ip).classList.add('show');
  };
});
['toneChips','relChips'].forEach(id => {
  $(id).querySelectorAll('.chip').forEach(c => {
    c.onclick = () => { $(id).querySelectorAll('.chip').forEach(x=>x.classList.remove('on')); c.classList.add('on'); };
  });
});
const picked = id => $(id).querySelector('.chip.on')?.dataset.v || '';

/* ══ 圖片上傳 ══ */
const dz=$('dropZone'), fi=$('fileIn');
['dragenter','dragover'].forEach(e=>dz.addEventListener(e,ev=>{ev.preventDefault();dz.classList.add('over')}));
['dragleave','drop'].forEach(e=>dz.addEventListener(e,ev=>{ev.preventDefault();dz.classList.remove('over')}));
dz.addEventListener('drop',e=>{const f=e.dataTransfer.files[0];if(f)loadImg(f)});
fi.onchange=()=>{if(fi.files[0])loadImg(fi.files[0])};
$('rmImg').onclick=ev=>{ev.preventDefault();ev.stopPropagation();imgData=null;fi.value='';$('prevWrap').classList.remove('show')};

function loadImg(file){
  if(!file.type.startsWith('image/')) return showErr('請上傳 JPG、PNG 或 WEBP 圖片。');
  const r=new FileReader();
  r.onerror=()=>showErr('圖片讀取失敗。');
  r.onload=ev=>{
    const img=new Image();
    img.onload=()=>{
      const MAX=1600;let{width:w,height:h}=img;
      if(w>MAX||h>MAX||file.size>3*1024*1024){
        const s=Math.min(MAX/w,MAX/h,1);w=Math.round(w*s);h=Math.round(h*s);
        const cv=document.createElement('canvas');cv.width=w;cv.height=h;
        cv.getContext('2d').drawImage(img,0,0,w,h);
        const url=cv.toDataURL('image/jpeg',.88);
        imgData=url;imgMime='image/jpeg';$('prevImg').src=url;
      }else{imgData=ev.target.result;imgMime=file.type;$('prevImg').src=ev.target.result;}
      $('prevWrap').classList.add('show');clearErr();
    };
    img.onerror=()=>showErr('無法解析圖片。');
    img.src=ev.target.result;
  };
  r.readAsDataURL(file);
}

function showErr(msg){const b=$('errBox');b.textContent=msg;b.classList.add('show');b.scrollIntoView({behavior:'smooth',block:'nearest'})}
function clearErr(){$('errBox').classList.remove('show')}

/* ══ 生成回覆建議（走 GAS，失敗不扣次由後端控管）══ */
async function generateReply(retry){
  clearErr();
  if(member && !member.allow){
    return showErr('次數已用完或會員已到期，請聯繫管理員儲值。');
  }
  const usingImg=$('ip-img').classList.contains('show');
  const txt=$('txtIn').value.trim();
  if(usingImg&&!imgData) return showErr('請先上傳截圖，或切換到貼上文字。');
  if(!usingImg&&!txt) return showErr('請先貼上對話內容。');

  const params = {
    action:'generate', type:'reply',
    model: curModel(),
    tone: picked('toneChips'),
    rel:  picked('relChips')
  };
  if(usingImg) params.image = imgData;   // data:image/...;base64,xxx 完整字串
  else params.text = txt;

  const btn=$('goBtn');
  btn.disabled=true;
  $('loading').classList.add('show');
  if(!retry)$('results').innerHTML='';

  try{
    const d = await callGAS(params);
    if(!d.success){
      if(d.errorType==='no_permission'){ member && (member.allow=false); updateMemberUI(); }
      throw new Error(d.errMsg||'生成失敗，請再試一次。');
    }
    applyRemain(d);
    renderReplies(d.data.replies);
  }catch(e){
    showErr(e.name==='TypeError'?'連不上伺服器，請確認網路。':e.message);
  }finally{
    btn.disabled=false;
    $('loading').classList.remove('show');
  }
}

function renderReplies(replies){
  const box=$('results');box.innerHTML='';
  replies.slice(0,3).forEach((r,i)=>{
    const card=document.createElement('div');card.className='reply-card';card.style.animationDelay=(i*.1)+'s';
    const head=document.createElement('div');head.className='reply-head';
    const lbl=document.createElement('span');lbl.className='reply-label';lbl.innerHTML=`<span class="reply-dot"></span>${r.style||'建議'+(i+1)}`;
    const cp=document.createElement('button');cp.className='copy-btn';cp.textContent='複製';
    const sv=document.createElement('button');sv.className='copy-btn';sv.textContent='☆ 儲存';
    sv.onclick=()=>{
      saveItem('reply', r.style||('建議'+(i+1)), r.text||'');
      sv.textContent='★ 已存';sv.classList.add('done');
      if(navigator.vibrate)navigator.vibrate(20);
      setTimeout(()=>{sv.textContent='☆ 儲存';sv.classList.remove('done')},1600);
    };
    const acts=document.createElement('div');acts.className='card-acts';acts.append(sv,cp);
    head.append(lbl,acts);
    const body=document.createElement('div');body.className='reply-body';body.textContent=r.text||'';
    cp.onclick=()=>copyText(body.textContent,cp,'done');
    card.append(head,body);box.appendChild(card);
  });
  const rb=document.createElement('button');rb.className='btn-retry';rb.textContent='↻ 換一批說法';rb.onclick=()=>generateReply(true);box.appendChild(rb);
  setTimeout(()=>box.firstChild?.scrollIntoView({behavior:'smooth',block:'start'}),80);
}

/* ══ 生成點評激活（走 GAS）══ */
async function generateAppr(retry){
  const errB=$('apprErr');
  errB.classList.remove('show');
  if(member && !member.allow){
    errB.textContent='次數已用完或會員已到期，請聯繫管理員儲值。';
    errB.classList.add('show');
    return;
  }

  const t = TPL[curTpl];
  const params = { action:'generate', type:'appr', model:curModel(), tpl:curTpl };
  for(const f of t.fields){
    const el = $('fld_' + f.k);
    const v = (el?.value || '').trim();
    if(f.req && !v){
      errB.textContent = '請填寫：' + f.label;
      errB.classList.add('show');
      el?.focus();
      el?.scrollIntoView({behavior:'smooth',block:'center'});
      return;
    }
    params[f.k] = v;
  }

  const btn=$('apprBtn');
  btn.disabled=true;
  $('apprLoading').classList.add('show');
  if(!retry)$('apprResults').innerHTML='';

  try{
    const d = await callGAS(params);
    if(!d.success){
      if(d.errorType==='no_permission'){ member && (member.allow=false); updateMemberUI(); }
      throw new Error(d.errMsg||'生成失敗，請再試一次。');
    }
    applyRemain(d);
    renderAppr(d.data);
  }catch(e){
    errB.textContent=e.name==='TypeError'?'連不上伺服器，請確認網路。':e.message;
    errB.classList.add('show');
  }finally{
    btn.disabled=false;
    $('apprLoading').classList.remove('show');
  }
}

function renderAppr(parsed){
  const box=$('apprResults');box.innerHTML='';
  const tplName = TPL[curTpl] ? TPL[curTpl].name : '點評激活';
  const card=document.createElement('div');card.className='appr-card';
  const head=document.createElement('div');head.className='appr-head';
  const lbl=document.createElement('span');lbl.className='appr-label';lbl.textContent=`❤ ${parsed.title||tplName}`;
  const cp=document.createElement('button');cp.className='copy-btn';cp.textContent='複製';
  const sv=document.createElement('button');sv.className='copy-btn';sv.textContent='☆ 儲存';
  sv.onclick=()=>{
    saveItem('appr', parsed.title||tplName, parsed.text||'');
    sv.textContent='★ 已存';sv.classList.add('done-amber');
    if(navigator.vibrate)navigator.vibrate(20);
    setTimeout(()=>{sv.textContent='☆ 儲存';sv.classList.remove('done-amber')},1600);
  };
  const acts=document.createElement('div');acts.className='card-acts';acts.append(sv,cp);
  head.append(lbl,acts);
  const body=document.createElement('div');body.className='appr-body';body.textContent=parsed.text||'';
  cp.onclick=()=>copyText(body.textContent,cp,'done-amber');
  card.append(head,body);
  const rb=document.createElement('button');rb.className='btn-retry';rb.textContent='↻ 換一個說法';rb.onclick=()=>generateAppr(true);
  box.append(card,rb);
  card.scrollIntoView({behavior:'smooth',block:'start'});
}

/* ══ 使用導引 ══ */
const K_GUIDE_SEEN = 'rai_guide_seen';
const GUIDE_STEPS = [
  { icon:'👋', title:'歡迎使用回覆靈感', desc:'不知道怎麼開口的話，AI 幫你想；想寫真誠的點評文字，也幫你寫。' },
  { icon:'❤️', title:'點評激活', desc:'想寫感謝、寒暄、或道歉的話卻不知道怎麼說？選一種模板，跟著問題填，AI 幫你把心意寫成真誠的文字。' },
  { icon:'💬', title:'回覆建議', desc:'上傳截圖或貼文字，選好語氣和對方身分，AI 會給你 3 個風格不同的回覆，一鍵複製或收藏。' },
  { icon:'🔖', title:'已儲存', desc:'覺得不錯的回覆或點評文字，按「☆ 儲存」就會留在這裡，隨時回來複製使用。' },
  { icon:'☰', title:'左上角選單', desc:'點左上角的選單，可以快速切換功能、查看會員次數，或再看一次這個導引。' }
];
let guideIdx = 0;

function renderGuideStep(){
  const s = GUIDE_STEPS[guideIdx];
  $('guideIcon').textContent = s.icon;
  $('guideTitle').textContent = s.title;
  $('guideDesc').textContent = s.desc;
  $('guideDots').innerHTML = GUIDE_STEPS.map((_, i) => `<span class="guide-dot${i===guideIdx?' on':''}"></span>`).join('');
  $('guideNext').textContent = guideIdx === GUIDE_STEPS.length - 1 ? '開始使用' : '下一步';
}
function startGuide(){
  guideIdx = 0;
  renderGuideStep();
  $('guideOverlay').classList.add('show');
}
function endGuide(){
  $('guideOverlay').classList.remove('show');
  localStorage.setItem(K_GUIDE_SEEN, '1');
}
$('guideNext').onclick = () => {
  if(guideIdx < GUIDE_STEPS.length - 1){ guideIdx++; renderGuideStep(); }
  else endGuide();
};
$('guideSkip').onclick = endGuide;

function maybeStartGuideForNewUser(){
  if(!localStorage.getItem(K_GUIDE_SEEN)) startGuide();
}
const K_SAVED = 'rai_saved';
function loadSaved(){
  try{ return JSON.parse(localStorage.getItem(K_SAVED)) || []; }
  catch{ return []; }
}
function saveItem(type, label, text){
  const list = loadSaved();
  list.unshift({ id: Date.now()+''+Math.floor(Math.random()*1e4), type, label, text, ts: Date.now() });
  if(list.length > 100) list.length = 100;
  localStorage.setItem(K_SAVED, JSON.stringify(list));
}
function delItem(id){
  localStorage.setItem(K_SAVED, JSON.stringify(loadSaved().filter(x => x.id !== id)));
  renderSaved();
}
function fmtTs(ts){
  return new Date(ts).toLocaleString('zh-TW',{month:'numeric',day:'numeric',hour:'2-digit',minute:'2-digit'});
}
function copyText(t, btn, doneClass){
  return (async()=>{
    try{ await navigator.clipboard.writeText(t); }
    catch{
      const ta=document.createElement('textarea');
      ta.value=t;Object.assign(ta.style,{position:'fixed',top:'-9999px'});
      document.body.append(ta);ta.select();document.execCommand('copy');ta.remove();
    }
    btn.textContent='✓ 已複製';btn.classList.add(doneClass);
    if(navigator.vibrate)navigator.vibrate(28);
    setTimeout(()=>{btn.textContent='複製';btn.classList.remove(doneClass)},2000);
  })();
}
function renderSaved(){
  const box = $('savedList');
  const clearBtn = $('clearSaved');
  const list = loadSaved();
  box.innerHTML = '';
  if(!list.length){
    const empty = document.createElement('div');
    empty.className = 'saved-empty';
    empty.innerHTML = '<i>🔖</i>還沒有儲存任何內容<br>在生成結果按「☆ 儲存」就會出現在這裡';
    box.appendChild(empty);
    clearBtn.style.display = 'none';
    return;
  }
  clearBtn.style.display = 'block';
  list.forEach(item => {
    const isAppr = item.type === 'appr';
    const card = document.createElement('div');
    card.className = isAppr ? 'appr-card' : 'reply-card';
    const head = document.createElement('div');
    head.className = isAppr ? 'appr-head' : 'reply-head';
    const meta = document.createElement('div');
    meta.className = 'saved-meta';
    const typeTag = document.createElement('span');
    typeTag.className = 'saved-type' + (isAppr ? ' amber' : '');
    typeTag.textContent = isAppr ? '激活' : '回覆';
    const label = document.createElement('span');
    label.className = 'saved-label';
    label.textContent = item.label;
    const time = document.createElement('span');
    time.className = 'saved-time';
    time.textContent = fmtTs(item.ts);
    meta.append(typeTag, label, time);
    const acts = document.createElement('div');
    acts.className = 'card-acts';
    const cp = document.createElement('button');
    cp.className = 'copy-btn'; cp.textContent = '複製';
    cp.onclick = () => copyText(item.text, cp, isAppr ? 'done-amber' : 'done');
    const del = document.createElement('button');
    del.className = 'del-btn'; del.textContent = '刪除';
    del.onclick = () => delItem(item.id);
    acts.append(cp, del);
    head.append(meta, acts);
    const body = document.createElement('div');
    body.className = isAppr ? 'appr-body' : 'reply-body';
    body.textContent = item.text;
    card.append(head, body);
    box.appendChild(card);
  });
}
$('clearSaved').onclick = () => {
  if(loadSaved().length && confirm('確定要清空所有儲存的內容嗎？此動作無法復原。')){
    localStorage.removeItem(K_SAVED);
    renderSaved();
  }
};
