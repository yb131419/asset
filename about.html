<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>莫凡韓式皮膚管理</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap');
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: #fdf2f8;
      font-family: 'Noto Sans TC', sans-serif;
      color: #444;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 100vh;
      padding: 30px 15px;
    }

    main {
      background: #ffffff;
      border-radius: 20px;
      box-shadow: 0 8px 30px rgba(0, 0, 0, 0.06);
      width: 100%;
      max-width: 420px;
      padding: 36px 28px;
    }

    h2 {
      font-weight: 700;
      margin-bottom: 32px;
      text-align: center;
      line-height: 1.5;
    }

    h2 .main-title {
      font-size: 1.6rem;
      display: block;
      margin-bottom: 8px;
      background: linear-gradient(90deg, #ff8da1, #c77dff);
      -webkit-background-clip: text;
      color: transparent;
      white-space: nowrap;
    }

    h2 .sub-title {
      font-size: 0.95rem;
      font-weight: 500;
      color: #888;
    }

    form label {
      display: block;
      margin-bottom: 8px;
      font-weight: 500;
      font-size: 0.95rem;
      color: #555;
    }

    input[type="text"],
    input[type="email"],
    input[type="tel"],
    input[type="date"],
    select,
    textarea {
      width: 100%;
      padding: 14px 16px;
      border-radius: 12px;
      border: 1px solid #f0f0f0;
      font-size: 1rem;
      background: #fefefe;
      color: #333;
      margin-bottom: 20px;
      transition: all 0.3s ease;
      font-family: 'Noto Sans TC', sans-serif;
      font-weight: 500;
      letter-spacing: 0.3px;
    }

    textarea {
      min-height: 85px;
      resize: vertical;
      line-height: 1.5;
    }

    input:focus, select:focus, textarea:focus {
      background: #fff;
      border-color: #ff85a2;
      outline: none;
      box-shadow: 0 0 0 3px rgba(255,133,162,0.1);
    }

    .time-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 22px;
    }

    .time-btn {
      padding: 12px;
      border-radius: 10px;
      border: 1px solid #eee;
      background: #fff;
      font-family: 'Noto Sans TC', sans-serif;
      font-size: 0.95rem;
      font-weight: 500;
      color: #444;
      cursor: pointer;
      transition: 0.2s;
      text-align: center;
    }

    .time-btn:hover {
      border-color: #ff85a2;
      color: #ff4d88;
    }

    .time-btn.active {
      background: #ff85a2;
      color: #fff;
      border-color: #ff85a2;
    }

    .btn-container {
      margin-top: 12px;
    }

    button {
      width: 100%;
      background: linear-gradient(135deg, #ff87b2, #e05686);
      border: none;
      padding: 16px;
      border-radius: 14px;
      font-size: 1rem;
      color: #fff;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 6px 16px rgba(255,135,178,0.25);
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 8px;
      font-family: 'Noto Sans TC', sans-serif;
    }

    button:disabled {
      opacity: 0.7;
      cursor: not-allowed;
    }

    button.permanent-disabled {
      opacity: 0.5;
      background: #777 !important;
      box-shadow: none;
      cursor: not-allowed;
    }

    .loader {
      width: 18px;
      height: 18px;
      border: 2px solid #fff;
      border-bottom-color: transparent;
      border-radius: 50%;
      animation: rotation 1s linear infinite;
      display: none;
    }

    button.loading .loader {
      display: block;
    }

    @keyframes rotation {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    @keyframes successPulse {
      0% { transform: scale(1); }
      50% { transform: scale(1.05); }
      100% { transform: scale(1); }
    }

    .success {
      animation: successPulse 0.6s ease-in-out;
      background: #2dd386 !important;
      box-shadow: 0 6px 16px rgba(45,211,134,0.25) !important;
    }

    .error {
      animation: successPulse 0.6s ease-in-out;
      background: #ff4d6d !important;
    }
  </style>
</head>
<body>
  <main>
    <h2>
      <span class="main-title">莫凡韓式皮膚管理 線上預約系統</span>
      <span class="sub-title">『選擇服務項目』<br>填寫資料預約｜LINE即時通知</span>
    </h2>

    <form id="infoForm">
      <input type="hidden" id="pageId" value="美容預約系統">
      <input type="hidden" id="lineId" value="guest">
      <input type="hidden" id="appointTime" name="appointTime">

      <label>服務項目</label>
      <select id="serviceType" required>
        <option value="">請選擇服務項目</option>
        <option value="臉部保養">臉部保養</option>
        <option value="深層清潔">深層清潔</option>
        <option value="除毛服務">除毛服務</option>        
        <option value="身體SPA">身體SPA</option>
        <option value="美甲美睫">美甲美睫</option>
        <option value="彩妝造型">彩妝造型</option>
        <option value="其他服務">其他服務</option>
      </select>

      <label>預約日期</label>
      <input type="date" id="appointDate" required>

      <label>預約時段</label>
      <div class="time-grid" id="timeGrid">
        <div style="color:#999;text-align:center;grid-column:1/3">請先選擇日期</div>
      </div>

      <label>姓名</label>
      <input type="text" id="name" required placeholder="請輸入您的姓名">

      <label>聯絡電話</label>
      <input type="tel" id="phone" required placeholder="請輸入聯絡電話">

      <label>電子信箱（選填）</label>
      <input type="email" id="email" placeholder="請輸入電子信箱">

      <label>備註說明</label>
      <textarea id="extraInfo" placeholder="肌膚狀況、特殊需求備註（選填）"></textarea>

      <div class="btn-container">
        <button type="submit" id="submitBtn">
          <span class="loader"></span>
          <span class="btn-text">確認預約</span>
        </button>
      </div>
    </form>
  </main>

<script>
  const CONFIG = {
    SCRIPT_URL: "https://script.google.com/macros/s/AKfycbzK69yZdryeXLsZZsgeIyqy-DNLrJ3aztFDyc8fhXABUEOfBP8OsAF8_v-Dfi4E9JVDtA/exec"
  };

  let submitBtn, btnText, infoForm;
  let isSubmitting = false;
  let isSubmittedSuccess = false;
  let timeDataMap = {};

  window.callback = function (response) {
    try {
      isSubmitting = false;
      submitBtn.classList.remove('loading');
      if (response.status === "init") {
        timeDataMap = response.timeMap || {};
        renderTimeList();
      }
      if (response.status === "success") {
        isSubmittedSuccess = true;
        submitBtn.classList.add('success','permanent-disabled');
        submitBtn.disabled = true;
        btnText.textContent = '預約成功 ✅';
        alert("✅ 預約成功！管理員已收到通知");
        infoForm.reset();
      }
    } catch (e) {}
  };

  function renderTimeList() {
    const date = document.getElementById('appointDate').value;
    const grid = document.getElementById('timeGrid');
    const timeInput = document.getElementById('appointTime');
    grid.innerHTML = "";
    timeInput.value = "";

    const list = timeDataMap[date] || [];
    if (list.length === 0) {
      grid.innerHTML = `<div style="grid-column:1/3;text-align:center;color:#999">當日無可預約時段</div>`;
      return;
    }

    list.forEach(t => {
      const btn = document.createElement('div');
      btn.className = 'time-btn';
      btn.textContent = t.label;
      btn.dataset.val = t.value;
      btn.onclick = () => {
        document.querySelectorAll('.time-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        timeInput.value = t.value;
      };
      grid.appendChild(btn);
    });
  }

  function resetButtonState() {
    if (isSubmittedSuccess) return;
    submitBtn.disabled = false;
    submitBtn.classList.remove('loading','success','error');
    btnText.textContent = '確認預約';
    isSubmitting = false;
  }

  function sendData() {
    try {
      const data = {
        pageId: "美容預約系統",
        lineId: "guest",
        serviceType: document.getElementById('serviceType').value,
        appointDate: document.getElementById('appointDate').value,
        appointTime: document.getElementById('appointTime').value,
        name: document.getElementById('name').value,
        phone: document.getElementById('phone').value,
        email: document.getElementById('email').value,
        extraInfo: document.getElementById('extraInfo').value
      };
      const p = new URLSearchParams(data);
      const s = document.createElement('script');
      s.src = `${CONFIG.SCRIPT_URL}?${p}&callback=callback&_=${Date.now()}`;
      document.body.appendChild(s);
    } catch (e) {
      alert("提交失敗，請重試");
      resetButtonState();
    }
  }

  document.addEventListener('DOMContentLoaded', () => {
    submitBtn = document.getElementById('submitBtn');
    btnText = submitBtn.querySelector('.btn-text');
    infoForm = document.getElementById('infoForm');

    document.getElementById('appointDate').addEventListener('change', renderTimeList);

    infoForm.addEventListener('submit', (e) => {
      e.preventDefault();
      const t = document.getElementById('appointTime').value;
      if (!t) return alert("請選擇預約時段");
      isSubmitting = true;
      submitBtn.disabled = true;
      submitBtn.classList.add('loading');
      btnText.textContent = '預約中...';
      sendData();
    });
  });
</script>
</body>
</html>
